<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#121615" />
    <title>Shadow Steps Offline</title>
    <style>
      :root {
        color: #f6efe5;
        background: #111514;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background:
          linear-gradient(135deg, rgba(245, 236, 221, 0.08), transparent 34%),
          #111514;
      }

      main {
        width: min(34rem, calc(100% - 2rem));
      }

      h1 {
        margin: 0;
        color: #fff7ea;
        font-size: clamp(3rem, 14vw, 5rem);
        line-height: 0.95;
      }

      p {
        color: #d7d0c4;
        font-size: 1.1rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Offline ready.</h1>
      <p>Shadow Steps will reconnect when the path clears.</p>
    </main>
  </body>
</html>
