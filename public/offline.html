<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#02040a" />
    <title>Shadow Steps Offline</title>
    <style>
      :root {
        color: #edf7ff;
        background: #02040a;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background:
          radial-gradient(circle at 20% 0%, rgba(62, 69, 255, 0.32), transparent 24rem),
          radial-gradient(circle at 82% 16%, rgba(0, 216, 255, 0.18), transparent 20rem),
          #02040a;
      }

      main {
        width: min(34rem, calc(100% - 2rem));
      }

      h1 {
        margin: 0;
        color: #ffffff;
        font-size: clamp(3rem, 14vw, 5rem);
        line-height: 0.95;
      }

      p {
        color: #9fb1d5;
        font-size: 1.1rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Offline protocol active.</h1>
      <p>Shadow Steps will restore the interface when the signal returns.</p>
    </main>
  </body>
</html>
